name: Bybit Bot (Email)

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests numpy

    - name: Run bot
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        PYTHONUNBUFFERED: '1'
      run: |
        python -u bot_core_email.py
